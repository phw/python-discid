name: Linting
on:
  push:
    paths: &path-list
    - '.github/workflows/lint.yaml'
    - '**/*.py'
  pull_request:
    paths: *path-list

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Ruff lint
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check --output-format=github"
      - name: Ruff format check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "format --diff"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ty
        run: pip install ty
      - name: Type check
        run: ty check --verbose
